<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Editor</title>
    <style>
        :root {
            --primary-1: #303a59;
            --primary-2: #394980;
            --primary-3: #22283b;
            --purple-1: #9b39d5;
            --purple-2: #ad50e3;
            --purple-3: #6d2e91;
            --red-1: #e34f4f;
            --red-2: #fc6464;
            --red-3: #cc1414;
            --blue-3: #222a9f;
            --blue-4: #2e80ee;
            --blue-5: #4f94f1;
            --green-1: #1dd06d;
            --lime-1: #1dd06d;
            --lime-2: #36e785;
            --lime-3: #1dd06d;
            --near-black: #0f0f0f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Verdana", "Candara", "Roboto", "Oxygen", "Ubuntu", "Trebuchet MS", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif !important;
        }

        .HomePageBackgroundContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            z-index: 0;
        }

        .HomePageBackground {
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAACXBIWXMAAAPoAAAD6AG1e1JrAAAAIUlEQVR4nGOQUtX5r23pjBMzUEcBPsyArgPdRCooIOQGAAigZFnRRKyWAAAAAElFTkSuQmCC");
            background-repeat: repeat;
            background-position: 50%;
            background-size: 8rem;
            filter: brightness(.6);
            height: 100%;
            image-rendering: optimizeSpeed;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: optimize-contrast;
            left: 0;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 1;
        }

        .GameBackgroundScreen {
            align-items: center;
            display: flex;
            height: 100vh;
            height: 100dvh;
            justify-content: center;
            left: 0;
            pointer-events: auto;
            position: fixed;
            top: 0;
            width: 100vw;
            z-index: 5;
            flex-direction: column;
            gap:
                0px;
        }

        .CodeEditMessage {
            width: 65rem;
            background-color: var(--primary-1);
            text-align: center;
            box-sizing: border-box;
            border: 2px solid #303a59;
            border-bottom: none;
            box-shadow: 0 -1px 0 0 #394980, -1px 0 0 0 #394980, 1px 0 0 0 #394980;
            color: #fff;
            font-weight: bold;
            padding: 10px 0;
            display: block;
        }

        .CodeEditorContent {
            height: 40rem;
            width: 65rem;
            position: relative;
            border: 2px solid #1a1f2e;
            box-shadow: 0 0 0 1px #394980, .4rem .5rem 0 #00000070;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #editor-row {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            min-height: 0;
        }

        #editor-container {
            flex: 1;
            overflow: hidden;
            min-width: 0;
        }

        .cm-editor {
            height: 100%;
            font-size: 13px;
        }

        .cm-scroller {
            overflow: auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Verdana", "Candara", "Roboto", "Oxygen", "Ubuntu", "Trebuchet MS", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif !important;
        }

        .StatusBar {
            background: #0f1320;
            border-top: 1px solid #394980;
            padding: 3px 12px;
            display: flex;
            gap: 18px;
            font-size: 11px;
            color: #6c7086;
            font-family: monospace;
            flex-shrink: 0;
        }

        #status-pos {
            color: #1dd06d;
        }

        #status-lang {
            color: #4f94f1;
        }

        #status-mode {
            color: #ffff00;
        }

        #status-chars {
            color: #fc6464;
        }

        .ButtonsRow {
            display: flex;
            align-items: center;
            gap: .6rem;
            width: 65rem;
            position: relative;
            justify-content: flex-start;
            min-height: 3rem;
        }

        .NewButton {
            --buttonNormalColour: var(--blue-4);
            --buttonTopColour: var(--blue-5);
            --buttonBottomColour: var(--blue-3);
            background-color: var(--buttonNormalColour);
            border: 1px solid var(--near-black);
            border-radius: 0;
            box-shadow: .2rem .25rem 0 #00000052;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            text-align: center;
            text-shadow:
                -1px -1px 0 #303a59, -1px 0 0 #303a59, -1px 1px 0 #303a59,
                0 -1px 0 #303a59, 0 1px 0 #303a59,
                1px -1px 0 #303a59, 1px 0 0 #303a59, 1px 1px 0 #303a59;
            transition: transform .12s, filter .12s;
            will-change: transform;
            z-index: 1;
            padding: .6rem 1.5rem;
            color: #fff;
            font-size: .9rem;
            font-weight: 700;
            letter-spacing: .02em;
            min-width: 7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .NewButton:hover {
            filter: brightness(1.18);
            transform: translateY(-1px);
        }

        .NewButton:active {
            transform: translateY(1px);
            box-shadow: .05rem .08rem 0 #00000052;
        }

        .NewButton .ButtonBottomBorder {
            background: var(--buttonBottomColour);
            bottom: 0;
            height: .21em;
            left: 0;
            position: absolute;
            width: 100%;
            z-index: 1;
        }

        .NewButton .ButtonTopBorder {
            background: var(--buttonTopColour);
            height: .21em;
            left: 0;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 1;
        }

        .NewButton .ButtonBody {
            gap: .4em;
            min-width: 0;
            overflow-x: hidden;
            position: relative;
            text-overflow: ellipsis;
            white-space: nowrap;
            z-index: 2;
        }

        .LimeButton {
            --buttonNormalColour: var(--lime-1);
            --buttonTopColour: var(--lime-2);
            --buttonBottomColour: var(--lime-3);
        }

        .PurpleButton {
            --buttonNormalColour: var(--purple-1);
            --buttonTopColour: var(--purple-2);
            --buttonBottomColour: var(--purple-3);
        }

        .BlueButton {
            --buttonNormalColour: var(--blue-4);
            --buttonTopColour: var(--blue-5);
            --buttonBottomColour: var(--blue-3);
        }

        .GreenButton {
            --buttonNormalColour: #18a856;
            --buttonTopColour: var(--green-1);
            --buttonBottomColour: #0d7a3c;
        }

        .RedButton {
            --buttonNormalColour: var(--red-1);
            --buttonTopColour: var(--red-2);
            --buttonBottomColour: var(--red-3);
        }

        .LangSelectWrap {
            display: inline-block;
            flex-shrink: 0;
            position: relative;
        }

        .LangSelect {
            appearance: none;
            background-color: var(--primary-2);
            border: 1px solid var(--near-black);
            border-radius: 0;
            box-shadow: .2rem .25rem 0 #00000052;
            color: #fff;
            cursor: pointer;
            font-size: .9rem;
            font-weight: 700;
            letter-spacing: .02em;
            outline: none;
            padding: .6rem 2.2rem .6rem 1.2rem;
            text-shadow: -1px -1px 0 #303a59, 1px 1px 0 #303a59;
            min-width: 8rem;
        }

        .LangSelectWrap::after {
            content: '▾';
            position: absolute;
            right: .7rem;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            pointer-events: none;
            font-size: .8rem;
        }

        ::-webkit-scrollbar {
            width: 1.5vmin;
            max-width: 12px;
            background-color: #1a1f2e;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #555;
            box-shadow: inset 0 0 6px #0000004d;
        }

        ::-webkit-scrollbar-track {
            background-color: #1a1f2e;
            box-shadow: inset 0 0 6px #0000004d;
        }

        .EditorToast {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1dd06d;
            color: #0f1320;
            font-weight: 700;
            font-size: 13px;
            text-align: center;
            padding: 5px 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Verdana", "Candara", "Roboto", "Oxygen", "Ubuntu", "Trebuchet MS", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            transform: translateY(100%);
            opacity: 0;
            transition: transform .18s, opacity .18s;
            z-index: 50;
            pointer-events: none;
        }

        .EditorToast.show {
            transform: translateY(0);
            opacity: 1;
        }

        #sig-popup {
            display: none;
            position: fixed;
            z-index: 200;
            background: #1b1f2e;
            border: 1px solid #394980;
            box-shadow: 0 4px 16px #00000080, .15rem .2rem 0 #00000040;
            padding: .55rem .8rem .5rem;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 12.5px;
            line-height: 1.6;
            min-width: 260px;
            max-width: 520px;
            pointer-events: none;
            white-space: pre;
        }

        #sig-popup .sig-method {
            font-weight: 700;
            color: #abb2bf;
        }

        #sig-popup .sig-paren {
            color: #abb2bf;
        }

        #sig-popup .sig-param {
            color: #e5c07b;
        }

        #sig-popup .sig-param.active {
            color: #fff;
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        #sig-popup .sig-type {
            color: #61afef;
        }

        #sig-popup .sig-optional {
            color: #5c6370;
        }

        #sig-popup .sig-returns {
            color: #56b6c2;
            font-weight: 700;
        }

        #sig-popup .sig-sep {
            color: #5c6370;
            margin: 0 .15em;
        }

        #sig-popup .sig-desc {
            margin-top: .35rem;
            padding-top: .35rem;
            border-top: 1px solid #2a3050;
            color: #7a8499;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Verdana", "Candara", "Roboto", "Oxygen", "Ubuntu", "Trebuchet MS", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            font-size: 11.5px;
            white-space: normal;
            line-height: 1.5;
        }

        #sig-popup .sig-param-hint {
            display: block;
            color: #5c6370;
            font-size: 11px;
            margin-top: .1rem;
        }

        #sig-popup .sig-param-hint .sig-param-name {
            color: #e5c07b;
        }

        #sig-popup .sig-param-hint .sig-param-desc {
            color: #7a8499;
        }

        #sig-popup .sig-deprecated {
            color: #e06c75;
            font-size: 11px;
            margin-bottom: .2rem;
        }

        .monaco-list-row,
        .monaco-list-row .contents,
        .monaco-list-row .main-line {
            height: auto !important;
            line-height: normal !important;
            display: flex !important;
            flex-direction: column !important;
        }

        .monaco-list-row .monaco-highlighted-label {
            white-space: pre-wrap !important;
            display: inline-block !important;
        }

        .monaco-list-row .monaco-highlighted-label .signature {
            display: block !important;
            margin-top: 4px;
            color: #888;
        }

        #editor-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1f2e;
            z-index: 20;
            pointer-events: none;
            transition: opacity .3s;
        }

        #editor-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-track {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.25);
            position: relative;
        }

        .loading-arc {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 5px solid transparent;
            border-top-color: #4f94f1;
            border-right-color: #4f94f1;
            animation: editorSpin .75s linear infinite;
        }

        @keyframes editorSpin {
            to {
                transform: rotate(360deg);
            }
        }

        #minimap-wrap {
            width: 110px;
            flex-shrink: 0;
            position: relative;
            background: #0d1119;
            border-left: 1px solid #2a3050;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
            transition: width .2s, border-color .2s;
        }

        #minimap-wrap.mm-hidden {
            width: 0;
            border-left: none;
        }

        #minimap-canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #minimap-vbox {
            position: absolute;
            left: 0;
            right: 0;
            background: rgba(79, 148, 241, 0.13);
            border-top: 1px solid rgba(79, 148, 241, 0.5);
            border-bottom: 1px solid rgba(79, 148, 241, 0.5);
            pointer-events: none;
            transition: top .05s, height .05s;
        }

        #settings-btn {
            cursor: pointer;
            color: #6c7086;
            font-size: 14px;
            margin-left: auto;
            line-height: 1;
            padding: 1px 4px;
            border-radius: 3px;
            transition: color .15s;
        }

        #settings-btn:hover {
            color: #4f94f1;
        }

        #settings-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }

        #settings-overlay.open {
            display: flex;
        }

        #settings-modal {
            background: #1b1f2e;
            border: 1px solid #394980;
            box-shadow: 0 8px 32px #00000080, .3rem .4rem 0 #00000040;
            padding: 0;
            width: 320px;
            min-width: 260px;
            font-family: inherit;
            color: #cdd6f4;
        }

        #settings-modal header {
            background: #151a28;
            border-bottom: 1px solid #2a3050;
            padding: .5rem 1rem;
            font-weight: 700;
            font-size: .9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #settings-close {
            cursor: pointer;
            color: #6c7086;
            font-size: 1rem;
            line-height: 1;
        }

        #settings-close:hover {
            color: #fc6464;
        }

        .settings-section {
            padding: .6rem 1rem;
            border-bottom: 1px solid #2a3050;
            font-size: .82rem;
        }

        .settings-section:last-child {
            border-bottom: none;
        }

        .settings-section h3 {
            color: #89b4fa;
            font-size: .75rem;
            letter-spacing: .06em;
            text-transform: uppercase;
            margin-bottom: .45rem;
            font-weight: 700;
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: .3rem;
        }

        .settings-row:last-child {
            margin-bottom: 0;
        }

        .settings-label {
            color: #a6adc8;
        }

        .sw {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
            flex-shrink: 0;
        }

        .sw input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .sw-track {
            position: absolute;
            inset: 0;
            background: #313244;
            border-radius: 9px;
            cursor: pointer;
            transition: background .2s;
        }

        .sw input:checked+.sw-track {
            background: #4f94f1;
        }

        .sw-track::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform .2s;
        }

        .sw input:checked+.sw-track::after {
            transform: translateX(16px);
        }

        .settings-file-row {
            display: flex;
            gap: .4rem;
            margin-top: .4rem;
        }

        .settings-file-btn {
            flex: 1;
            background: #313244;
            border: 1px solid #45475a;
            color: #cdd6f4;
            font-size: .78rem;
            padding: .3rem .5rem;
            cursor: pointer;
            font-family: inherit;
            text-align: center;
            transition: background .15s;
        }

        .settings-file-btn:hover {
            background: #45475a;
        }

        #save-dialog-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            z-index: 600;
            align-items: center;
            justify-content: center;
        }

        #save-dialog-overlay.open {
            display: flex;
        }

        #save-dialog {
            background: #1b1f2e;
            border: 1px solid #394980;
            box-shadow: 0 8px 32px #00000080, .3rem .4rem 0 #00000040;
            width: 300px;
            color: #cdd6f4;
            font-family: inherit;
        }

        #save-dialog header {
            background: #151a28;
            border-bottom: 1px solid #2a3050;
            padding: .5rem 1rem;
            font-weight: 700;
            font-size: .9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #save-dialog-close {
            cursor: pointer;
            color: #6c7086;
        }

        #save-dialog-close:hover {
            color: #fc6464;
        }

        .save-dialog-body {
            padding: .8rem 1rem;
        }

        .save-dialog-label {
            display: block;
            font-size: .75rem;
            color: #89b4fa;
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: .3rem;
            font-weight: 700;
        }

        #save-filename-input {
            width: 100%;
            background: #0d1119;
            border: 1px solid #394980;
            color: #cdd6f4;
            font-family: inherit;
            font-size: .85rem;
            padding: .4rem .6rem;
            margin-bottom: .6rem;
            outline: none;
            box-sizing: border-box;
        }

        #save-filename-input:focus {
            border-color: #4f94f1;
        }

        #save-ext-select {
            width: 100%;
            background: #0d1119;
            border: 1px solid #394980;
            color: #cdd6f4;
            font-family: inherit;
            font-size: .85rem;
            padding: .4rem .6rem;
            margin-bottom: .8rem;
            outline: none;
            appearance: none;
            cursor: pointer;
            box-sizing: border-box;
        }

        #save-ext-select:focus {
            border-color: #4f94f1;
        }

        .save-dialog-btns {
            display: flex;
            gap: .5rem;
        }

        .save-dialog-btn {
            flex: 1;
            background: #313244;
            border: 1px solid #45475a;
            color: #cdd6f4;
            font-family: inherit;
            font-size: .82rem;
            padding: .4rem;
            cursor: pointer;
            transition: background .15s;
            font-weight: 700;
        }

        .save-dialog-btn:hover {
            background: #45475a;
        }

        .save-dialog-btn.primary {
            background: #4f94f1;
            border-color: #2e80ee;
            color: #fff;
        }

        .save-dialog-btn.primary:hover {
            background: #2e80ee;
        }

        .version {
            color: #888da0;
            position: fixed;
            right: 10px;
            bottom: 10px;
            z-index: 1000;
            font-family: monospace;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="HomePageBackgroundContainer">
        <div class="HomePageBackground"></div>
    </div>

    <div class="version">
        preview. 1.3.0
    </div>


    <div class="GameBackgroundScreen">

        <div class="CodeEditMessage" id="mode-msg">
            Code Block
        </div>
        <div class="CodeEditorContent">
            <div id="editor-row">
                <div id="editor-container" style="position:relative">
                    <div id="editor-loading">
                        <div class="loading-track">
                            <div class="loading-arc"></div>
                        </div>
                    </div>
                </div>
                <div id="minimap-wrap">
                    <canvas id="minimap-canvas"></canvas>
                    <div id="minimap-vbox"></div>
                </div>
            </div>
            <div class="StatusBar">
                <span id="status-pos">Line 1, Column 1</span>
                <span id="status-lang">JavaScript</span>
                <span id="status-mode">Code Block</span>
                <span id="status-chars">0 Character</span>
                <span id="settings-btn" title="設定"><i class="fa-solid fa-gear"></i></span>
            </div>
            <div class="EditorToast" id="editor-toast"></div>
        </div>

        <div class="ButtonsRow">
            <div class="LangSelectWrap">
                <select class="LangSelect" id="lang-select">
                    <option value="javascript">JavaScript</option>
                    <option value="typescript">TypeScript</option>
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="python">Python</option>
                    <option value="json">JSON</option>
                    <option value="markdown">Markdown</option>
                    <option value="sql">SQL</option>
                    <option value="cpp">C++</option>
                    <option value="java">Java</option>
                </select>
            </div>

            <button class="NewButton LimeButton" id="btn-submit">
                <div class="ButtonTopBorder"></div>
                <span class="ButtonBody">Submit Code</span>
                <div class="ButtonBottomBorder"></div>
            </button>

            <button class="NewButton PurpleButton" id="btn-more">
                <div class="ButtonTopBorder"></div>
                <span class="ButtonBody">Show Docs</span>
                <div class="ButtonBottomBorder"></div>
            </button>

            <button class="NewButton BlueButton" id="btn-format">
                <div class="ButtonTopBorder"></div>
                <span class="ButtonBody">Format Code</span>
                <div class="ButtonBottomBorder"></div>
            </button>

            <button class="NewButton BlueButton" id="btn-copy">
                <div class="ButtonTopBorder"></div>
                <span class="ButtonBody">Copy Code</span>
                <div class="ButtonBottomBorder"></div>
            </button>

            <button class="NewButton BlueButton" id="btn-hidetool">
                <div class="ButtonTopBorder"></div>

            <!--
    <button class="NewButton RedButton" id="btn-clear">

    <input type="file" id="file-input-hidden" accept=".txt,.js,.ts,.html,.css,.py,.json,.md,.sql,.cpp,.java"
        style="display:none">

    <script type="module">
        import { EditorState, StateField, StateEffect } from 'https://esm.sh/@codemirror/state@6';
        import { EditorView, keymap, lineNumbers, highlightActiveLine, highlightActiveLineGutter, drawSelection, dropCursor, rectangularSelection, crosshairCursor } from 'https://esm.sh/@codemirror/view@6';
        import { defaultKeymap, history, historyKeymap, indentWithTab } from 'https://esm.sh/@codemirror/commands@6';
        import { searchKeymap, highlightSelectionMatches } from 'https://esm.sh/@codemirror/search@6';
        import { autocompletion, completionKeymap, closeBrackets, closeBracketsKeymap } from 'https://esm.sh/@codemirror/autocomplete@6';
        import { foldGutter, indentOnInput, syntaxHighlighting, defaultHighlightStyle, bracketMatching, foldKeymap } from 'https://esm.sh/@codemirror/language@6';
        import { lintKeymap } from 'https://esm.sh/@codemirror/lint@6';
        import { javascript } from 'https://esm.sh/@codemirror/lang-javascript@6';
        import { html } from 'https://esm.sh/@codemirror/lang-html@6';
        import { css } from 'https://esm.sh/@codemirror/lang-css@6';
        import { python } from 'https://esm.sh/@codemirror/lang-python@6';
        import { json } from 'https://esm.sh/@codemirror/lang-json@6';
        import { markdown } from 'https://esm.sh/@codemirror/lang-markdown@6';
        import { sql } from 'https://esm.sh/@codemirror/lang-sql@6';
        import { cpp } from 'https://esm.sh/@codemirror/lang-cpp@6';
        import { java } from 'https://esm.sh/@codemirror/lang-java@6';
        import { oneDark } from 'https://esm.sh/@codemirror/theme-one-dark@6';
        import prettier from 'https://esm.sh/prettier@3.0.3/standalone';
        import estree from 'https://esm.sh/prettier@3.0.3/plugins/estree';
        import babel from 'https://esm.sh/prettier@3.0.3/plugins/babel';
        import htmlPlugin from 'https://esm.sh/prettier@3.0.3/plugins/html';
        import cssPlugin from 'https://esm.sh/prettier@3.0.3/plugins/postcss';

        const languageMap = {
            javascript: () => javascript({ jsx: true, typescript: false }),
            typescript: () => javascript({ jsx: true, typescript: true }),
            html: () => html(), css: () => css(), python: () => python(),
            json: () => json(), markdown: () => markdown(),
            sql: () => sql(), cpp: () => cpp(), java: () => java(),
        };
        const languageLabels = {
            javascript: 'JavaScript', typescript: 'TypeScript', html: 'HTML', css: 'CSS',
            python: 'Python', json: 'JSON', markdown: 'Markdown', sql: 'SQL', cpp: 'C++', java: 'Java',
        };

        let currentLang = 'javascript';
        let currentMode = 'codeblock';
        let autosaveEnabled = true;
        let codeBlockDoc = localStorage.getItem('bloxd_ce_codeblock') ?? `api.log("hello, world!")`;
        let worldCodeDoc = localStorage.getItem('bloxd_ce_worldcode') ?? `/*
	tick onClose onPlayerJoin onPlayerLeave onPlayerJump onRespawnRequest
	playerCommand onPlayerChat onPlayerChangeBlock onPlayerDropItem
	onPlayerPickedUpItem onPlayerSelectInventorySlot onBlockStand
	onPlayerAttemptCraft onPlayerCraft onPlayerAttemptOpenChest
	onPlayerOpenedChest onPlayerMoveItemOutOfInventory onPlayerMoveInvenItem
	onPlayerMoveItemIntoIdxs onPlayerSwapInvenSlots onPlayerMoveInvenItemWithAmt
	onPlayerAttemptAltAction onPlayerAltAction onPlayerClick onPlayerClickUp
	onClientOptionUpdated onMobSettingUpdated onInventoryUpdated onChestUpdated
	onWorldChangeBlock onCreateBloxdMeshEntity onEntityCollision
	onPlayerAttemptSpawnMob onWorldAttemptSpawnMob onPlayerSpawnMob
	onWorldSpawnMob onWorldAttemptDespawnMob onMobDespawned onPlayerAttack
	onPlayerDamagingOtherPlayer onPlayerDamagingMob onMobDamagingPlayer
	onMobDamagingOtherMob onAttemptKillPlayer onPlayerKilledOtherPlayer
	onMobKilledPlayer onPlayerKilledMob onMobKilledOtherMob onPlayerPotionEffect
	onPlayerDamagingMeshEntity onPlayerBreakMeshEntity onPlayerUsedThrowable
	onPlayerThrowableHitTerrain onTouchscreenActionButton onTaskClaimed
	onChunkLoaded onPlayerRequestChunk onItemDropCreated
	onPlayerStartChargingItem onPlayerFinishChargingItem onPlayerFinishQTE
	onPlayerBoughtShopItem doPeriodicSave

	To use a callback, just assign a function to it in the world code!
	tick = () => {}			 or			 function tick() {}
*/

api.log("World code callbacks go here!")`;
        let tooltipsEnabled = true;
        let view;

        const statusPos = document.getElementById('status-pos');
        const statusLang = document.getElementById('status-lang');
        const statusMode = document.getElementById('status-mode');
        const statusChars = document.getElementById('status-chars');

        function updateStatus(state) {
            const cursor = state.selection.main.head;
            const line = state.doc.lineAt(cursor);
            const mode = document.getElementById('mode-msg');
            statusMode.textContent = `${mode.textContent}`;
            statusPos.textContent = `Line ${line.number}, Column ${cursor - line.from + 1}`;
            statusChars.textContent = `${state.doc.length} Character`;
        }

        const deleteBracketPair = {
            key: 'Backspace',
            run: (view) => {
                const { state } = view;
                const sel = state.selection.main;
                if (sel.from !== sel.to) return false;
                const from = sel.from;
                if (from === 0) return false;
                const before = state.doc.sliceString(from - 1, from);
                const after = state.doc.sliceString(from, from + 1);
                const pairs = { '(': ')', '[': ']', '{': '}' };
                if (pairs[before] === after) {
                    view.dispatch({ changes: { from: from - 1, to: from + 1 } });
                    return true;
                }
                return false;
            }
        };

        function buildExtensions(lang) {
            return [
                lineNumbers(), highlightActiveLineGutter(), highlightActiveLine(),
                highlightSelectionMatches(), foldGutter(), drawSelection(),
                dropCursor(), rectangularSelection(), crosshairCursor(),
                bracketMatching(), closeBrackets(), history(), indentOnInput(),
                autocompletion({ override: [myCompletions] }),
                syntaxHighlighting(defaultHighlightStyle, { fallback: true }),
                oneDark,
                keymap.of([
                    deleteBracketPair,
                    ...defaultKeymap, ...historyKeymap, ...searchKeymap,
                    ...completionKeymap, ...closeBracketsKeymap, ...foldKeymap,
                    ...lintKeymap, indentWithTab,
                ]),
                languageMap[lang](),
                EditorView.updateListener.of(update => {
                    if (update.docChanged || update.selectionSet) {
                        updateStatus(update.state);
                        updateSignatureHelp(update.view);
                    }
                    if (update.docChanged) {
                        drawMinimap();
                        if (autosaveEnabled) saveCurrentToStorage();
                    } else if (update.selectionSet) {
                        updateMinimapViewport();
                    }
                }),
                EditorView.theme({
                    '&': { height: '100%', background: '#1a1f2e' },
                    '.cm-content': { padding: '6px 0' },
                    '.cm-line': { padding: '0 14px' },
                    '.cm-gutters': { background: '#151a28', borderRight: '1px solid #394980', paddingLeft: '6px' },
                    '.cm-activeLineGutter': { background: '#1e253a' },
                    '.cm-activeLine': { background: '#1e253a88' },
                }),
            ];
        }

        view = new EditorView({
            state: EditorState.create({ doc: codeBlockDoc, extensions: buildExtensions(currentLang) }),
            parent: document.getElementById('editor-container'),
        });

        requestAnimationFrame(() => {
            const loader = document.getElementById('editor-loading');
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 350);
            initMinimap();
        });

        updateStatus(view.state);

        window.addEventListener('beforeunload', () => {
            if (!autosaveEnabled) return;
            localStorage.setItem('bloxd_ce_codeblock', codeBlockDoc);
            localStorage.setItem('bloxd_ce_worldcode', worldCodeDoc);
            const key = currentMode === 'worldcode' ? 'bloxd_ce_worldcode' : 'bloxd_ce_codeblock';
            localStorage.setItem(key, view.state.doc.toString());
        });

        const MM_W = 110;
        const MM_LINE_H = 2;
        const MM_CHAR_W = 1.4;
        const MM_PAD = 4;

        let mmDragging = false;
        let mmEnabled = false;

        function initMinimap() {
            const wrap = document.getElementById('minimap-wrap');
            const canvas = document.getElementById('minimap-canvas');
            const toggle = document.getElementById('minimap-toggle-btn');

            view.scrollDOM.addEventListener('scroll', () => {
                syncMinimapScroll();
                updateMinimapViewport();
            });

            wrap.addEventListener('mousedown', (e) => {
                mmDragging = true;
                minimapSeek(e.offsetY, wrap, canvas);
                e.preventDefault();
            });
            document.addEventListener('mousemove', (e) => {
                if (!mmDragging) return;
                const rect = wrap.getBoundingClientRect();
                minimapSeek(e.clientY - rect.top, wrap, canvas);
            });
            document.addEventListener('mouseup', () => { mmDragging = false; });

            wrap.classList.add('mm-hidden');

            drawMinimap();
        }

        function minimapSeek(offsetY, wrap, canvas) {
            const totalLines = view.state.doc.lines;
            const totalH = totalLines * MM_LINE_H;
            const wrapH = wrap.clientHeight;
            const canvasTop = parseFloat(canvas.style.top || '0');
            const absoluteY = offsetY - canvasTop;
            const fraction = Math.max(0, Math.min(1, absoluteY / totalH));
            const maxScroll = view.scrollDOM.scrollHeight - view.scrollDOM.clientHeight;
            view.scrollDOM.scrollTop = fraction * maxScroll;
        }

        function syncMinimapScroll() {
            const canvas = document.getElementById('minimap-canvas');
            const wrap = document.getElementById('minimap-wrap');
            if (!canvas || !wrap) return;

            const totalLines = view.state.doc.lines;
            const totalH = totalLines * MM_LINE_H;
            const wrapH = wrap.clientHeight;

            if (totalH <= wrapH) {
                canvas.style.top = '0px';
                return;
            }

            const scrollDOM = view.scrollDOM;
            const scrollFrac = scrollDOM.scrollTop / (scrollDOM.scrollHeight - scrollDOM.clientHeight || 1);
            const lineH = view.defaultLineHeight || 16;
            const visibleH = scrollDOM.clientHeight / lineH * MM_LINE_H;
            const vpTop = scrollFrac * (totalH - visibleH);
            const idealScroll = vpTop - (wrapH - visibleH) / 2;
            const maxScroll = totalH - wrapH;
            const cScroll = Math.max(0, Math.min(maxScroll, idealScroll));
            canvas.style.top = `-${cScroll}px`;
        }

        function updateMinimapViewport() {
            const vbox = document.getElementById('minimap-vbox');
            const canvas = document.getElementById('minimap-canvas');
            const wrap = document.getElementById('minimap-wrap');
            if (!vbox || !canvas || !wrap) return;

            const totalLines = view.state.doc.lines;
            const totalH = totalLines * MM_LINE_H;
            const scrollH = view.scrollDOM.scrollHeight || 1;
            const clientH = view.scrollDOM.clientHeight;
            const scrollT = view.scrollDOM.scrollTop;

            const topFrac = scrollT / scrollH;
            const hFrac = clientH / scrollH;
            const cTop = parseFloat(canvas.style.top || '0');

            vbox.style.top = `${topFrac * totalH + cTop}px`;
            vbox.style.height = `${Math.max(4, hFrac * totalH)}px`;
        }

        function tokenizeForMinimap(text) {
            const colors = new Array(text.length).fill('#5a6380');
            const rules = [
                [/\/\/.*$/g, '#4a6a4a'],
                [/"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`/g, '#9a7a3a'],
                [/\b(const|let|var|function|return|if|else|for|while|new|this|true|false|null|undefined|async|await|class|import|export|from|of|in|typeof|instanceof)\b/g, '#4466bb'],  // keyword
                [/\b\d+\.?\d*\b/g, '#aa6633'],
                [/\bapi\b/g, '#9966cc'],
            ];
            for (const [re, color] of rules) {
                re.lastIndex = 0;
                let m;
                while ((m = re.exec(text)) !== null) {
                    for (let k = m.index; k < m.index + m[0].length; k++) colors[k] = color;
                }
            }
            return colors;
        }

        function drawMinimap() {
            if (!mmEnabled) return;
            const canvas = document.getElementById('minimap-canvas');
            const wrap = document.getElementById('minimap-wrap');
            if (!canvas || !wrap) return;

            const doc = view.state.doc;
            const totalLines = doc.lines;
            const h = totalLines * MM_LINE_H;
            canvas.width = MM_W;
            canvas.height = Math.max(h, 1);

            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0d1119';
            ctx.fillRect(0, 0, MM_W, canvas.height);

            for (let i = 1; i <= totalLines; i++) {
                const line = doc.line(i);
                const text = line.text;
                const y = (i - 1) * MM_LINE_H;
                const colors = tokenizeForMinimap(text);

                for (let j = 0; j < text.length; j++) {
                    const x = MM_PAD + j * MM_CHAR_W;
                    if (x + MM_CHAR_W > MM_W) break;
                    const ch = text[j];
                    if (ch === ' ' || ch === '\t') continue;
                    ctx.fillStyle = colors[j];
                    ctx.fillRect(x, y, MM_CHAR_W, MM_LINE_H - 0.3);
                }
            }

            syncMinimapScroll();
            updateMinimapViewport();
        }

        const settingsOverlay = document.getElementById('settings-overlay');
        const swMinimap = document.getElementById('sw-minimap');
        const swAutosave = document.getElementById('sw-autosave');

        document.getElementById('settings-btn').addEventListener('click', () => {
            settingsOverlay.classList.add('open');
        });
        document.getElementById('settings-close').addEventListener('click', () => {
            settingsOverlay.classList.remove('open');
        });
        settingsOverlay.addEventListener('click', (e) => {
            if (e.target === settingsOverlay) settingsOverlay.classList.remove('open');
        });

        swMinimap.checked = mmEnabled;
        swMinimap.addEventListener('change', () => {
            mmEnabled = swMinimap.checked;
            const wrap = document.getElementById('minimap-wrap');
            wrap.classList.toggle('mm-hidden', !mmEnabled);
            if (mmEnabled) drawMinimap();
        });

        swAutosave.addEventListener('change', () => {
            autosaveEnabled = swAutosave.checked;
            if (!autosaveEnabled) {
                localStorage.removeItem('bloxd_ce_codeblock');
                localStorage.removeItem('bloxd_ce_worldcode');
                showEditorToast('Auto-save disabled', '#e34f4f', '#fff');
            } else {
                showEditorToast('Auto-save enabled');
            }
        });

        const langToExt = {
            javascript: '.js', typescript: '.ts', html: '.html',
            css: '.css', python: '.py', json: '.json',
            markdown: '.md', sql: '.sql', cpp: '.cpp', java: '.java',
        };
        const extToLang = {
            '.js': 'javascript', '.mjs': 'javascript', '.cjs': 'javascript',
            '.ts': 'typescript', '.tsx': 'typescript',
            '.html': 'html', '.htm': 'html',
            '.css': 'css',
            '.py': 'python',
            '.json': 'json',
            '.md': 'markdown', '.markdown': 'markdown',
            '.sql': 'sql',
            '.cpp': 'cpp', '.cc': 'cpp', '.cxx': 'cpp', '.c': 'cpp',
            '.java': 'java',
        };

        const saveDialogOverlay = document.getElementById('save-dialog-overlay');
        const saveExtSelect = document.getElementById('save-ext-select');
        const saveFilenameInput = document.getElementById('save-filename-input');

        function openSaveDialog() {
            const ext = langToExt[currentLang] || '.txt';
            for (const opt of saveExtSelect.options) {
                if (opt.value === ext) { opt.selected = true; break; }
            }
            saveFilenameInput.value = currentMode === 'worldcode' ? 'worldcode' : 'code';
            saveDialogOverlay.classList.add('open');
            setTimeout(() => saveFilenameInput.select(), 50);
        }

        document.getElementById('btn-save-file').addEventListener('click', openSaveDialog);

        document.getElementById('save-dialog-close').addEventListener('click', () =>
            saveDialogOverlay.classList.remove('open'));
        document.getElementById('save-dialog-cancel').addEventListener('click', () =>
            saveDialogOverlay.classList.remove('open'));
        saveDialogOverlay.addEventListener('click', (e) => {
            if (e.target === saveDialogOverlay) saveDialogOverlay.classList.remove('open');
        });

        document.getElementById('save-dialog-confirm').addEventListener('click', () => {
            const code = view.state.doc.toString();
            const ext = saveExtSelect.value;
            const name = (saveFilenameInput.value.trim() || 'code') + ext;
            const blob = new Blob([code], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
            URL.revokeObjectURL(url);
            saveDialogOverlay.classList.remove('open');
            settingsOverlay.classList.remove('open');
            showEditorToast('Saved: ' + name);
        });

        const fileInput = document.getElementById('file-input');
        document.getElementById('btn-load-file').addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const text = ev.target.result;
                const dotIdx = file.name.lastIndexOf('.');
                if (dotIdx !== -1) {
                    const ext = file.name.slice(dotIdx).toLowerCase();
                    const lang = extToLang[ext];
                    if (lang && lang !== currentLang) {
                        currentLang = lang;
                        statusLang.textContent = languageLabels[lang];
                        document.getElementById('lang-select').value = lang;
                    }
                }
                view.setState(EditorState.create({
                    doc: text,
                    extensions: buildExtensions(currentLang),
                }));
                settingsOverlay.classList.remove('open');
                showEditorToast('Loaded: ' + file.name);
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        function showEditorToast(msg, bg = '#1dd06d', fg = '#0f1320') {
            const t = document.getElementById('editor-toast');
            t.textContent = msg;
            t.style.background = bg;
            t.style.color = fg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 2200);
        }
        function showToast(msg, color = '#1dd06d') {
            const fg = color === '#e34f4f' ? '#fff' : '#0f1320';
            showEditorToast(msg, color, fg);
        }

        document.getElementById('lang-select').addEventListener('change', (e) => {
            saveCurrentToStorage();
            currentLang = e.target.value;
            statusLang.textContent = languageLabels[currentLang];
            const doc = view.state.doc.toString();
            view.setState(EditorState.create({ doc, extensions: buildExtensions(currentLang) }));
            if (typeof saveExtSelect !== 'undefined') {
                const ext = langToExt?.[currentLang] || '.txt';
                for (const opt of saveExtSelect.options) {
                    if (opt.value === ext) { opt.selected = true; break; }
                }
            }
        });

        document.getElementById('btn-submit').addEventListener('click', openSaveDialog);

        document.getElementById('btn-more').addEventListener('click', () => {
            window.open('https://github.com/bloxdy/code-api', '_blank');
        });

        document.getElementById('btn-format').addEventListener('click', async () => {
            const code = view.state.doc.toString();

            const prettierConfig = {
                javascript: { parser: "babel", plugins: [babel, estree] },
                typescript: { parser: "babel-ts", plugins: [babel, estree] },
                json: { parser: "json", plugins: [babel, estree] },
                html: { parser: "html", plugins: [htmlPlugin] },
                css: { parser: "css", plugins: [cssPlugin] },
            };

            const config = prettierConfig[currentLang];

            if (!config) {
                showToast(`${currentLang} は未対応です`, '#e34f4f');
                return;
            }

            try {
                const formatted = await prettier.format(code, {
                    ...config,
                    semi: true,
                    singleQuote: false,
                    tabWidth: 2,
                });

                view.dispatch({
                    changes: { from: 0, to: view.state.doc.length, insert: formatted }
                });
                showToast('✓ Formatted!');
            } catch (e) {
                showToast('Format Error: ' + e.message, '#e34f4f');
            }
        });

        document.getElementById('btn-copy').addEventListener('click', () => {
            navigator.clipboard.writeText(view.state.doc.toString()).then(() => showToast('✓ Copied!'));
        });

        document.getElementById('btn-hidetool').addEventListener('click', (e) => {
            tooltipsEnabled = !tooltipsEnabled;
            const btnText = e.currentTarget.querySelector('.ButtonBody');
            if (tooltipsEnabled) {
                btnText.textContent = 'Hide Tooltips';
                showToast('Tooltips enabled');
            } else {
                btnText.textContent = 'Show Tooltips';
                sigPopup.style.display = 'none';
                showToast('Tooltips hidden');
            }
        });

        function saveCurrentToStorage() {
            if (!autosaveEnabled) return;
            const key = currentMode === 'worldcode' ? 'bloxd_ce_worldcode' : 'bloxd_ce_codeblock';
            localStorage.setItem(key, view.state.doc.toString());
        }

        function setEditorMode(mode) {
            const currentDoc = view.state.doc.toString();
            if (currentMode === 'codeblock') {
                codeBlockDoc = currentDoc;
                if (autosaveEnabled) localStorage.setItem('bloxd_ce_codeblock', currentDoc);
            } else {

        const sigPopup = document.getElementById('sig-popup');

        function getSignatureContext(view) {
            const state = view.state;
            const cursor = state.selection.main.head;
            const text = state.doc.sliceString(0, cursor);
            let depth = 0, parenPos = -1;
            for (let i = cursor - 1; i >= Math.max(0, cursor - 2000); i--) {
                const ch = text[i];
                if (ch === ')') depth++;
                else if (ch === '(') {
                    if (depth === 0) { parenPos = i; break; }
                    depth--;
                }
            }
            if (parenPos === -1) return null;
            const before = text.slice(0, parenPos);
            const match = before.match(/api\.(\w+)$/);
            if (!match) return null;
            const methodName = match[1];
            const sig = API_SIGNATURES[methodName];
            if (!sig) return null;
            let paramIdx = 0, d = 0;
            for (let i = parenPos + 1; i < cursor; i++) {
                const ch = text[i];
                if ('([{'.includes(ch)) d++;
                else if (')]}'.includes(ch)) d--;
                else if (ch === ',' && d === 0) paramIdx++;
            }
            return { methodName, sig, paramIdx };
        }

        function renderSigPopup(view) {
            const ctx = getSignatureContext(view);
            if (!ctx) { sigPopup.style.display = 'none'; return; }
            const { methodName, sig, paramIdx } = ctx;

            let html = '';
            if (sig.deprecated) {
                html += `<div class="sig-deprecated" style="white-space:normal">⚠ deprecated</div>`;
            }

            if (sig.params.length === 0) {
                html +=
                    `<span class="sig-method">${methodName}</span>` +
                    `<span class="sig-paren">()</span>` +
                    `<span class="sig-sep">: </span>` +
                    `<span class="sig-returns">${sig.returns}</span>`;
            } else {
                const indent = '  ';
                const lastIdx = sig.params.length - 1;
                html += `<span class="sig-method">${methodName}</span><span class="sig-paren">(</span>\n`;
                sig.params.forEach((p, i) => {
                    const isActive = i === paramIdx;
                    const optMark = p.optional ? `<span class="sig-optional">?</span>` : '';
                    const comma = i < lastIdx ? `<span class="sig-sep">,</span>` : '';
                    html += indent +
                        `<span class="sig-param${isActive ? ' active' : ''}">${p.name}</span>${optMark}` +
                        `<span class="sig-sep">: </span>` +
                        `<span class="sig-type">${p.type}</span>` +
                        comma + '\n';
                });
                html +=
                    `<span class="sig-paren">)</span>` +
                    `<span class="sig-sep">: </span>` +
                    `<span class="sig-returns">${sig.returns}</span>`;
            }

            const activeParam = sig.params[paramIdx];
            if (activeParam && activeParam.desc) {
                html += `\n<span class="sig-param-hint" style="white-space:normal;display:block;margin-top:4px;">` +
                    `<span class="sig-param-name">${activeParam.name}</span>` +
                    ` — <span class="sig-param-desc">${activeParam.desc}</span></span>`;
            }
            if (sig.desc) html += `<div class="sig-desc" style="white-space:normal">${sig.desc}</div>`;

            sigPopup.innerHTML = html;

            const cursor = view.state.selection.main.head;
            const coords = view.coordsAtPos(cursor);
            if (!coords) { sigPopup.style.display = 'none'; return; }

            const popH = sigPopup.offsetHeight || 100;
            let left = coords.left;
            let top = coords.top - popH - 8;
            if (top < 0) top = coords.bottom + 8;
            if (left + 480 > window.innerWidth - 8) left = window.innerWidth - 480 - 8;
            if (left < 8) left = 8;

            sigPopup.style.left = `${left}px`;
            sigPopup.style.top = `${top}px`;
            sigPopup.style.display = 'block';
        }

        function updateSignatureHelp(view) {
            if (!tooltipsEnabled) { sigPopup.style.display = 'none'; return; }
            renderSigPopup(view);
        }

        function buildApiInfoDom(name, sig) {
            const el = document.createElement('div');
            el.style.cssText = [
                'font-family:"JetBrains Mono","Fira Code",Consolas,monospace',
                'font-size:12px',
                'line-height:1.75',
                'padding:5px 2px',
                'white-space:pre',
            ].join(';');

            if (sig.deprecated) {
                const dep = document.createElement('div');
                dep.style.cssText = 'color:#e06c75;margin-bottom:4px;font-size:11px;white-space:normal;';
                dep.textContent = '⚠ deprecated';
                el.appendChild(dep);
            }

            const sig_line = document.createElement('div');

            if (sig.params.length === 0) {
                sig_line.innerHTML =
                    `<span style="color:#abb2bf;font-weight:700">${name}</span>` +
                    `<span style="color:#abb2bf">()</span>` +
                    `<span style="color:#5c6370">: </span>` +
                    `<span style="color:#56b6c2;font-weight:700">${sig.returns}</span>`;
            } else {
                const indent = '  ';
                const lastIdx = sig.params.length - 1;

                let html =
                    `<span style="color:#abb2bf;font-weight:700">${name}</span>` +
                    `<span style="color:#abb2bf">(</span>\n`;

                sig.params.forEach((p, i) => {
                    const opt = p.optional ? `<span style="color:#5c6370">?</span>` : '';
                    const comma = i < lastIdx ? `<span style="color:#5c6370">,</span>` : '';
                    const desc = p.desc
                        ? `  <span style="color:#4a5370;font-size:11px">// ${p.desc}</span>`
                        : '';
                    html +=
                        `${indent}` +
                        `<span style="color:#e5c07b">${p.name}</span>${opt}` +
                        `<span style="color:#5c6370">: </span>` +
                        `<span style="color:#61afef">${p.type}</span>` +
                        comma + desc + `\n`;
                });

                html +=
                    `<span style="color:#abb2bf">)</span>` +
                    `<span style="color:#5c6370">: </span>` +
                    `<span style="color:#56b6c2;font-weight:700">${sig.returns}</span>`;

                sig_line.innerHTML = html;
            }

            el.appendChild(sig_line);

            if (sig.desc) {
                const desc = document.createElement('div');
                desc.style.cssText = [
                    'color:#7a8499',
                    'font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Verdana", "Candara", "Roboto", "Oxygen", "Ubuntu", "Trebuchet MS", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif',
                    'font-size:11.5px',
                    'margin-top:6px',
                    'border-top:1px solid #2a3050',
                    'padding-top:5px',
                    'white-space:normal',
                    'line-height:1.5',
                ].join(';');
                desc.textContent = sig.desc;
                el.appendChild(desc);
            }

            return el;
        }

        const API_METHODS = Object.entries(API_SIGNATURES).map(([name, sig]) => {
            const paramStr = sig.params.map(p => p.optional ? p.name + '?' : p.name).join(', ');

            { label: "onPlayerFinishChargingItem", detail: "= (playerId: string, ...) => void", info: "Called when a player finishes charging an item." },
            { label: "onPlayerFinishQTE", detail: "= (playerId: string, id: QTERequestId, result: any) => void", info: "Called when a player finishes a QTE." },
            { label: "onPlayerBoughtShopItem", detail: "= (playerId: string, ...) => void", info: "Called when a player buys a shop item." },
            { label: "doPeriodicSave", detail: "= () => void", info: "Called periodically to save game data." },
        ];

        function myCompletions(context) {
            if (!tooltipsEnabled) return null;

            let apiNode = context.matchBefore(/api\.\w*/);
            if (apiNode) {
                return {
                    from: apiNode.from + 4,
                    validFor: /^\w*$/,
                    options: API_METHODS.map(m => ({
                        label: m.name,
                        type: m.deprecated ? "property" : "method",
                        detail: `(${m.returns})`,
                        info: () => buildApiInfoDom(m.name, API_SIGNATURES[m.name] || { params: [], returns: m.returns, desc: m.desc, deprecated: m.deprecated }),
                        boost: m.deprecated ? -5 : 0,
                    }))
                };
            }

            let word = context.matchBefore(/\w+/);
            if (!word || (word.from === word.to && !context.explicit)) return null;

            const prefix = word.text.toLowerCase();

            const varOptions = GLOBAL_VARS
                .filter(v => v.label.toLowerCase().startsWith(prefix))
                .map(v => ({ ...v, boost: 10 }));

            const cbOptions = (currentMode === 'worldcode' ? CALLBACKS : [])
                .filter(c => c.label.toLowerCase().startsWith(prefix))
                .map(c => ({ ...c, type: "function", boost: 5 }));

            const keywords = ["as", "asserts", "async", "await", "break", "case", "catch", "class",
                "const", "continue", "debugger", "default", "delete", "do", "else", "enum", "export",
                "extends", "false", "finally", "for", "from", "function", "if", "import", "in",
                "instanceof", "let", "new", "null", "of", "return", "static", "switch", "this",
                "throw", "true", "try", "typeof", "undefined", "var", "void", "while", "with", "yield"];
            const kwOptions = keywords
                .filter(k => k.startsWith(prefix))
                .map(k => ({ label: k, type: "keyword" }));

            return {
                from: word.from,
                validFor: /^\w*$/,
                options: [...varOptions, ...cbOptions, ...kwOptions],
            };
        }
    </script>
